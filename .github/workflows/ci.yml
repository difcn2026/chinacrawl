# XHLS v3.0 | chinacrawl CI/CD
# Python 3.12 · lint (compileall) · auto-publish to PyPI on tag push

name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Compile Check (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx playwright trafilatura mcp

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: compileall check (syntax lint)
        run: |
          python -m compileall -x '__pycache__' chinacrawl/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
