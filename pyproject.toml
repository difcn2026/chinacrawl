[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "chinacrawl"
version = "0.1.0"
description = "ChinaCrawl ? The Firecrawl alternative that works in China. 11-in-1 web data engine: scrape, search, crawl, monitor, download, extract. Zero external API cost."
authors = [{ name = "Xiao Hei (XHLS)", email = "xhls@example.com" }]
license = { file = "LICENSE" }
readme = "README.md"
keywords = ["web-scraping", "crawler", "search", "monitor", "markdown", "firecrawl", "china"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP :: Indexing/Search",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.24",
    "trafilatura>=1.6",
]

[project.optional-dependencies]
full = ["playwright>=1.40"]
dev = ["pytest>=7", "pytest-asyncio"]

[project.urls]
Homepage = "https://github.com/xiaohei/chinacrawl"
Repository = "https://github.com/xiaohei/chinacrawl"
Issues = "https://github.com/xiaohei/chinacrawl/issues"

[tool.setuptools]
py-modules = ["chinacrawl"]

[tool.setuptools.package-data]
"*" = ["LICENSE", "README.md"]
